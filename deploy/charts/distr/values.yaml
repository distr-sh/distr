# Default values for distr.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

global:
  security:
    allowInsecureImages: true

# This will set the replicaset count more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/replicaset/
replicaCount: 2

# This sets the deployment strategy more information can be found here: https://kubernetes.io/docs/concepts/workloads/controllers/deployment/#strategy
strategy: {}
  # type: RollingUpdate
  # rollingUpdate:
  #   maxSurge: 25%
  #   maxUnavailable: 25%

# This sets the container image more information can be found here: https://kubernetes.io/docs/concepts/containers/images/
image:
  repository: ghcr.io/distr-sh/distr-ce
  # This sets the pull policy for images.
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ''

# This is for the secrets for pulling an image from a private repository more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/pull-image-private-registry/
imagePullSecrets: []
# This is to override the chart name.
nameOverride: ''
fullnameOverride: ''

# This section builds out the service account more information can be found here: https://kubernetes.io/docs/concepts/security/service-accounts/
serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ''

hub:
  env:
    - name: DISTR_HOST
      value: http://distr.local
    - name: REGISTRY_ENABLED
      value: 'true'
    # REGISTRY_* variables are only relevant if REGISTRY_ENABLED is true
    - name: REGISTRY_HOST
      value: pkg.distr.local
    - name: REGISTRY_S3_BUCKET
      value: distr
    # Set to true only for in-cluster S3-compatible storage (e.g. RustFS/MinIO) that requires bucket creation on startup.
    # Requires s3:CreateBucket permission. Set to false if the bucket already exists or CreateBucket permission is unavailable.
    - name: REGISTRY_S3_CREATE_BUCKET
      value: 'true'
    - name: REGISTRY_S3_REGION
      value: local
    - name: REGISTRY_S3_ENDPOINT
      value: http://distr-rustfs-svc:9000
    - name: REGISTRY_S3_ACCESS_KEY_ID
      value: distr
    - name: REGISTRY_S3_SECRET_ACCESS_KEY
      value: distr123
    - name: REGISTRY_S3_USE_PATH_STYLE
      value: 'true'
    - name: REGISTRY_S3_ALLOW_REDIRECT
      value: 'false'
    # Set of variables required to use GCP as a S3 compatible backend
    # - name: REGISTRY_S3_REQUEST_CHECKSUM_CALCULATION
    #   value: 'true'
    # - name: REGISTRY_S3_RESPONSE_CHECKSUM_VALIDATION
    #   value: 'true'
    # - name: REGISTRY_RESIGN_FOR_GCP
    #   value: 'true'
    # The base64 encoded JWT secret
    # Can be generated with `openssl rand -base64 32`
    - name: JWT_SECRET
      value: WQrGMYx4tZdGwKlt0RTrhMzfQ+j1wr6z7oRWfmGlETk=
      # We recommend reading the JWT secret from a secretKeyRef
      # valueFrom:
      #   secretKeyRef:
      #     name: ""
      #     key: ""
    - name: MAILER_FROM_ADDRESS
      value: My Distr <noreply@distr.local>
    - name: MAILER_TYPE
      # change to "ses" for direct usage of the AWS SDK for SES
      value: 'smtp'
    - name: MAILER_SMTP_HOST
      value: 'smtp.example.local'
    - name: MAILER_SMTP_PORT
      value: '25'
    # - name: MAILER_SMTP_USERNAME
    #   value: ""
    # - name: MAILER_SMTP_PASSWORD
    #  valueFrom:
    #    secretKeyRef:
    #      name: ""
    #      key: ""
    # Set MAILER_SMTP_IMPLICIT_TLS to "true", if you want to use SMTP over implicit TLS, rather than STARTTLS.
    # Generally, implicit TLS is required if your SMTP port is 465.
    # - name: MAILER_SMTP_IMPLICIT_TLS
    #   value: 'true'
    # User Registration Mode – can be one of "enabled" (default), "hidden", "disabled"
    # - name: REGISTRATION
    #   value: enabled
    - name: USER_EMAIL_VERIFICATION_REQUIRED
      value: 'false'
    - name: METRICS_ENTRIES_MAX_AGE
      value: '1h'
    # Loki stores deployment and deployment target log records (see the "loki" section below).
    - name: LOKI_URL
      value: http://distr-loki:3100
    # - name: LOKI_BEARER_TOKEN
    #   value: '...'
    # - name: LOKI_BASIC_AUTH_USERNAME
    #   value: '...'
    # - name: LOKI_BASIC_AUTH_PASSWORD
    #   value: '...'
    # - name: LOKI_REQUEST_TIMEOUT
    #   value: '30s'
    # - name: CLEANUP_ARTIFACT_BLOB_MIN_AGE
    #   value: '24h'
    # - name: CLEANUP_ORGANIZATION_MIN_AGE
    #   value: '720h'  # 30 days (default)
    # OIDC providers – see https://distr.sh/docs/self-hosting/oidc/
    # - name: OIDC_GITHUB_ENABLED
    #   value: 'true'
    # - name: OIDC_GITHUB_CLIENT_ID # required if OIDC_GITHUB_ENABLED
    #   value:
    # - name: OIDC_GITHUB_CLIENT_SECRET # required if OIDC_GITHUB_ENABLED
    #   value:
    # - name: OIDC_GOOGLE_ENABLED
    #   value: 'true'
    # - name: OIDC_GOOGLE_CLIENT_ID # required if OIDC_GOOGLE_ENABLED
    #   value:
    # - name: OIDC_GOOGLE_CLIENT_SECRET # required if OIDC_GOOGLE_ENABLED
    #   value:
    # - name: OIDC_MICROSOFT_ENABLED
    #   value: 'true'
    # - name: OIDC_MICROSOFT_CLIENT_ID # required if OIDC_MICROSOFT_ENABLED
    #   value:
    # - name: OIDC_MICROSOFT_CLIENT_SECRET # required if OIDC_MICROSOFT_ENABLED
    #   value:
    # - name: OIDC_MICROSOFT_TENANT_ID # required if OIDC_MICROSOFT_ENABLED
    #   value:
    # - name: OIDC_GENERIC_ENABLED
    #   value: 'true'
    # - name: OIDC_GENERIC_ISSUER
    #   value: 'http://distr-oidc-dex:5556/dex'
    # - name: OIDC_GENERIC_CLIENT_ID
    #   value: 'example-app'
    # - name: OIDC_GENERIC_CLIENT_SECRET
    #   value: 'example-app-secret'
    # - name: OIDC_GENERIC_SCOPES
    #   value: 'foo,bar,baz'
    - name: METRICS_ENABLED
      value: 'true'
    # - name: METRICS_ADDR
    #   value: '...'
    # - name: METRICS_BEARER_TOKEN
    #   value: '...'
  envFrom: []
  # The OCI registry can buffer request bodies to temporary files instead of holding
  # them in memory. When enabled, this provisions a generic ephemeral volume (a per-pod
  # PVC that is created and deleted together with the pod) and points REGISTRY_SCRATCH_DIR
  # at its mount path. Requires Kubernetes >= 1.23.
  scratch:
    enabled: false
    mountPath: /scratch
    # Size requested for the ephemeral volume.
    size: 10Gi
    # StorageClass for the ephemeral volume. An empty string uses the cluster default.
    storageClassName: ''
    accessModes:
      - ReadWriteOnce

# This is for setting Kubernetes Annotations to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/annotations/
podAnnotations: {}
# This is for setting Kubernetes Labels to a Pod.
# For more information checkout: https://kubernetes.io/docs/concepts/overview/working-with-objects/labels/
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532
  fsGroup: 65532

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

# This is for setting up a service more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/
service:
  # This sets the service type more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#publishing-services-service-types
  type: ClusterIP
  # This sets the ports more information can be found here: https://kubernetes.io/docs/concepts/services-networking/service/#field-spec-ports
  port: 8080
  artifactsPort: 8585
  metricsPort: 3000

# This block is for setting up the ingress for more information can be found here: https://kubernetes.io/docs/concepts/services-networking/ingress/
ingress:
  enabled: false
  className: ''
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: distr.local
      paths:
        - path: /
          pathType: ImplementationSpecific
          port:
            name: http
    - host: pkg.distr.local
      paths:
        - path: /
          pathType: ImplementationSpecific
          port:
            name: artifacts
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 1000m
  #   memory: 2Gi
  # requests:
  #   cpu: 100m
  #   memory: 256Mi

# This is to set up the liveness, readiness and startup probes more information can be found here: https://kubernetes.io/docs/tasks/configure-pod-container/configure-liveness-readiness-startup-probes/
# The startup probe allows up to 5 minutes (failureThreshold * periodSeconds = 30 * 10s) for the hub to become ready before liveness/readiness probes take over.
startupProbe:
  httpGet:
    path: /
    port: http
  periodSeconds: 10
  failureThreshold: 30
livenessProbe:
  httpGet:
    path: /
    port: http
readinessProbe:
  httpGet:
    path: /
    port: http

# This is the duration in seconds the pod needs to terminate gracefully after receiving a shutdown signal.
terminationGracePeriodSeconds: 60

# This section is for setting up autoscaling more information can be found here: https://kubernetes.io/docs/concepts/workloads/autoscaling/
autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 100
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []
# - name: foo
#   secret:
#     secretName: mysecret
#     optional: false

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []
# - name: foo
#   mountPath: "/etc/foo"
#   readOnly: true

nodeSelector: {}

tolerations: []

affinity: {}

cronJobs:
  - name: deployment-revision-status-cleanup
    labels:
      distr.sh/job: deployment-revision-status-cleanup
    args: [cleanup, DeploymentRevisionStatus, --timeout, 10m]
  - name: deployment-target-metrics-cleanup
    labels:
      distr.sh/job: deployment-target-metrics-cleanup
    args: [cleanup, DeploymentTargetMetrics, --timeout, 10m]
  - name: oidcstate-cleanup
    labels:
      distr.sh/job: oidcstate-cleanup
    args: [cleanup, OIDCState, --timeout, 10m]
  - name: artifact-blob-cleanup
    labels:
      distr.sh/job: artifact-blob-cleanup
    args: [cleanup, ArtifactBlob, --timeout, 10m]
  # - name: organization-cleanup
  #   labels:
  #     distr.sh/job: organization-cleanup
  #   args: [cleanup, Organization, --timeout, 10m]
  - name: registry-upstream-sync
    labels:
      distr.sh/job: registry-upstream-sync
    args: [maintenance, sync-artifacts-upstream, --timeout, 10m]

postgresql:
  enabled: false
  auth:
    username: distr
    password: ''
    database: distr
    existingSecret: ''
  architecture: standalone
  service:
    ports:
      postgresql: 5432
  image:
    repository: bitnamilegacy/postgresql
    tag: 17.6.0

rustfs:
  # When disabled, provide external object storage for the registry and for Loki
  # (see loki.loki.storage.s3), otherwise those components cannot persist data.
  enabled: false
  fullnameOverride: distr-rustfs
  secret:
    rustfs:
      # These are the source-of-truth object storage credentials. If you change them you
      # must keep loki.loki.storage.s3 and the loki create-loki-bucket init container
      # (loki.singleBinary.initContainers) in sync, otherwise Loki cannot access its bucket.
      access_key: 'distr'
      secret_key: 'distr123' # please change this
  mode:
    standalone:
      enabled: true
      strategy:
        type: Recreate
    distributed:
      enabled: false
  storageclass:
    name: ''
    dataStorageSize: 20Gi
    logStorageSize: 10Gi
  ingress:
    enabled: false

# Loki stores deployment and deployment target log records (default retention: 30 days).
# It runs in monolithic mode with a single replica and persists chunks + TSDB index in
# an S3-compatible object storage bucket (by default the in-cluster rustfs, using a
# dedicated "loki" bucket that is provisioned by an init container).
# Set loki.enabled to false to use an externally managed Loki instance instead and point
# LOKI_URL (and the optional LOKI_* auth variables) in hub.env at it.
loki:
  enabled: true
  fullnameOverride: distr-loki
  deploymentMode: Monolithic
  loki:
    auth_enabled: true
    commonConfig:
      replication_factor: 1
    schemaConfig:
      configs:
        - from: '2024-01-01'
          store: tsdb
          object_store: s3
          schema: v13
          index:
            prefix: index_
            period: 24h
    # Loki is enabled by default but rustfs.enabled is false by default, so the s3
    # settings below point at the in-cluster RustFS endpoint without it being deployed.
    # To persist logs you must either set rustfs.enabled=true or update these s3 settings
    # (and the create-loki-bucket initContainer below) to point at external object storage.
    storage:
      type: s3
      bucketNames:
        chunks: loki
        ruler: loki
        admin: loki
      s3:
        endpoint: http://distr-rustfs-svc:9000
        region: local
        # Must match rustfs.secret.rustfs and the create-loki-bucket init container below.
        accessKeyId: distr
        secretAccessKey: distr123 # please change this
        s3ForcePathStyle: true
    compactor:
      retention_enabled: true
      delete_request_store: s3
    server:
      # A single query result page (max_entries_limit_per_query entries) can exceed
      # the 4 MB gRPC default, which makes the internal querier->frontend handoff
      # fail and the query hang until it times out.
      grpc_server_max_recv_msg_size: 67108864
      grpc_server_max_send_msg_size: 67108864
    limits_config:
      retention_period: 720h # 30 days
      increment_duplicate_timestamp: true
      allow_structured_metadata: true
      max_global_streams_per_user: 25000
      # Truncate oversized log lines instead of rejecting the whole push.
      max_line_size_truncate: true
      # Accept backfilled logs up to the retention period so an agent that was
      # offline can still push its backlog.
      reject_old_samples_max_age: 720h
      # Raised moderately from Loki's 4/6 MB defaults to give an organization with
      # several chatty agents more headroom before pushes are throttled.
      ingestion_rate_mb: 16
      ingestion_burst_size_mb: 32
  singleBinary:
    replicas: 1
    persistence:
      size: 5Gi
    initContainers:
      - name: create-loki-bucket
        image: rclone/rclone:1.74.4
        command: [rclone, mkdir, 'storage:loki']
        env:
          - name: RCLONE_CONFIG_STORAGE_TYPE
            value: s3
          - name: RCLONE_CONFIG_STORAGE_PROVIDER
            value: Other
          - name: RCLONE_CONFIG_STORAGE_ENDPOINT
            value: http://distr-rustfs-svc:9000
          # Must match rustfs.secret.rustfs and loki.loki.storage.s3 above.
          - name: RCLONE_CONFIG_STORAGE_ACCESS_KEY_ID
            value: distr
          - name: RCLONE_CONFIG_STORAGE_SECRET_ACCESS_KEY
            value: distr123
  gateway:
    enabled: false
  lokiCanary:
    enabled: false
  test:
    enabled: false
  chunksCache:
    enabled: false
  resultsCache:
    enabled: false
  memcached:
    enabled: false
  backend:
    replicas: 0
  read:
    replicas: 0
  write:
    replicas: 0

externalDatabase:
  uri: ''
  existingSecret: ''
  existingSecretUriKey: 'uri'
