apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "distr.fullname" . }}
  labels:
    {{- include "distr.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  {{- with .Values.strategy }}
  strategy:
    {{- toYaml . | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "distr.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "distr.labels" . | nindent 8 }}
        app.kubernetes.io/component: hub
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "distr.serviceAccountName" . }}
      {{- /* The hub image runs as UID/GID 65532. Default fsGroup so the scratch
             ephemeral volume, provisioned root-owned by the CSI driver, is writable. */}}
      {{- $podSecurityContext := deepCopy (.Values.podSecurityContext | default dict) }}
      {{- if .Values.hub.scratch.enabled }}
      {{- $podSecurityContext = merge $podSecurityContext (dict "fsGroup" 65532) }}
      {{- end }}
      {{- with $podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.terminationGracePeriodSeconds }}
      terminationGracePeriodSeconds: {{ . }}
      {{- end }}
      containers:
        - name: hub
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
            - name: artifacts
              containerPort: {{ .Values.service.artifactsPort }}
              protocol: TCP
            - name: metrics
              containerPort: {{ .Values.service.metricsPort }}
              protocol: TCP
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- if or .Values.volumeMounts .Values.hub.scratch.enabled }}
          volumeMounts:
            {{- with .Values.volumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            {{- if .Values.hub.scratch.enabled }}
            - name: scratch
              mountPath: {{ .Values.hub.scratch.mountPath | quote }}
            {{- end }}
          {{- end }}
          {{- with .Values.hub.envFrom }}
          envFrom:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          env:
            {{- include "distr.hubEnv" . | nindent 12 }}
            {{- if .Values.hub.scratch.enabled }}
            - name: REGISTRY_SCRATCH_DIR
              value: {{ .Values.hub.scratch.mountPath | quote }}
            {{- end }}
      {{- if or .Values.volumes .Values.hub.scratch.enabled }}
      volumes:
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        {{- if .Values.hub.scratch.enabled }}
        - name: scratch
          ephemeral:
            volumeClaimTemplate:
              metadata:
                labels:
                  {{- include "distr.labels" . | nindent 18 }}
              spec:
                accessModes:
                  {{- toYaml .Values.hub.scratch.accessModes | nindent 18 }}
                {{- with .Values.hub.scratch.storageClassName }}
                storageClassName: {{ . | quote }}
                {{- end }}
                resources:
                  requests:
                    storage: {{ .Values.hub.scratch.size | quote }}
        {{- end }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
