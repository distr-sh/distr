{{- if .Values.caddy.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "distr.fullname" . }}-caddy
  labels:
    {{- include "distr.caddy.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  replicas: {{ .Values.caddy.replicaCount }}
  selector:
    matchLabels:
      {{- include "distr.caddy.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: caddy
  template:
    metadata:
      annotations:
        checksum/caddyfile: {{ include (print $.Template.BasePath "/caddy-configmap.yaml") . | sha256sum }}
      labels:
        {{- include "distr.caddy.labels" . | nindent 8 }}
        app.kubernetes.io/component: caddy
    spec:
      containers:
        - name: caddy
          image: "{{ .Values.caddy.image.repository }}:{{ .Values.caddy.image.tag }}"
          imagePullPolicy: {{ .Values.caddy.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
            - name: https
              containerPort: 443
              protocol: TCP
          readinessProbe:
            tcpSocket:
              port: https
          livenessProbe:
            tcpSocket:
              port: https
          {{- with .Values.caddy.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: caddyfile
              mountPath: /etc/caddy
              readOnly: true
            - name: data
              mountPath: /data
            - name: config
              mountPath: /config
      volumes:
        - name: caddyfile
          configMap:
            name: {{ include "distr.fullname" . }}-caddy
        - name: data
          {{- if .Values.caddy.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ include "distr.fullname" . }}-caddy-data
          {{- else }}
          emptyDir: {}
          {{- end }}
        - name: config
          emptyDir: {}
{{- if .Values.caddy.persistence.enabled }}
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "distr.fullname" . }}-caddy-data
  labels:
    {{- include "distr.caddy.labels" . | nindent 4 }}
    app.kubernetes.io/component: caddy
spec:
  accessModes:
    - ReadWriteOnce
  {{- with .Values.caddy.persistence.storageClassName }}
  storageClassName: {{ . | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.caddy.persistence.size | quote }}
{{- end }}
{{- end }}
