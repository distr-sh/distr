apiVersion: v2
name: distr
description: The easiest way to distribute enterprise software
keywords:
  - distr
  - software distribution
  - on-prem management
  - docker
  - kubernetes
maintainers:
  - name: Glasskube
    url: https://github.com/glasskube
icon: >-
  https://github.com/distr-sh/distr/raw/refs/heads/main/frontend/ui/public/distr-logo.svg
home: https://distr.sh/docs/
type: application
version: 3.0.1
appVersion: 3.0.1
dependencies:
  - name: postgresql
    repository: oci://registry-1.docker.io/bitnamicharts
    version: 18.8.0
    condition: postgresql.enabled
  - name: rustfs
    repository: https://charts.rustfs.com
    version: 0.10.0
    condition: rustfs.enabled
  - name: loki
    repository: oci://ghcr.io/grafana-community/helm-charts
    version: 18.5.1
    condition: loki.enabled
