name: distr

x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: '10m'
    max-file: '3'

services:
  # Caddy terminates TLS and automatically obtains/renews certificates for the
  # distr app and registry hostnames via ACME. It only joins the "proxy" network
  # and therefore has no route to postgres or the storage (rustfs) service.
  caddy:
    image: 'caddy:2.11.4-alpine'
    depends_on:
      - hub
    environment:
      DISTR_APP_HOSTNAME: ${DISTR_APP_HOSTNAME}
      DISTR_REGISTRY_HOSTNAME: ${DISTR_REGISTRY_HOSTNAME}
      CADDY_ACME_EMAIL: ${CADDY_ACME_EMAIL}
    # The Caddyfile is written inline on startup instead of being mounted, because
    # the distr agent does not support mounting files via volumes. The hostnames and
    # ACME email remain Caddy env placeholders ({$VAR}) that are resolved at runtime.
    entrypoint:
      - sh
      - -c
      - |
        cat > /etc/caddy/Caddyfile <<'EOF'
        {
        	email {$$CADDY_ACME_EMAIL}
        }

        {$$DISTR_APP_HOSTNAME} {
        	reverse_proxy hub:8080
        }

        {$$DISTR_REGISTRY_HOSTNAME} {
        	reverse_proxy hub:8585
        }
        EOF
        exec caddy run --config /etc/caddy/Caddyfile --adapter caddyfile
    volumes:
      - 'caddy_data:/data'
      - 'caddy_config:/config'
    ports:
      - '80:80'
      - '443:443'
    networks:
      - proxy
    restart: always
    logging: *default-logging

  postgres:
    image: 'postgres:18.4-alpine3.23'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - 'postgres:/var/lib/postgresql/'
    networks:
      - internal
    restart: always
    logging: *default-logging
    healthcheck:
      test: pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      start_interval: 1s
      interval: 5s
      retries: 6
      start_period: 30s

  hub:
    image: ghcr.io/distr-sh/distr-ce:3.0.2 # x-release-please-version
    depends_on:
      postgres:
        condition: service_healthy
      # Remove when using an external S3 provider
      storage:
        condition: service_healthy
      loki:
        condition: service_started
    env_file:
      - .env
    # No ports are exposed on the host. The hub is only reachable through the
    # caddy reverse proxy on the "proxy" network.
    networks:
      - proxy
      - internal
    restart: always
    logging: *default-logging

  # The OCI registry of distr can use any S3 compatible storage to store OCI images.
  # If you don't want to use the OCI registry (REGISTRY_ENABLED=false) or want to use an external S3 provider,
  # you don't need to run the storage service.
  storage:
    image: 'rustfs/rustfs:1.0.0-beta.8'
    volumes:
      - 'rustfs:/data/'
    environment:
      RUSTFS_ACCESS_KEY: ${REGISTRY_S3_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${REGISTRY_S3_SECRET_ACCESS_KEY}
    networks:
      - internal
    restart: always
    logging: *default-logging
    healthcheck:
      # Production strict TLS example (SAN/FQDN aligned, no `-k`):
      # curl -f --cacert /opt/tls/ca.crt --resolve rustfs-a.example.com:9000:127.0.0.1 https://rustfs-a.example.com:9000/health
      test: ['CMD', 'sh', '-c', 'curl -f http://127.0.0.1:9000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Loki stores deployment and deployment target log records (30 days retention).
  # It runs in monolithic (single-binary) mode and persists chunks + TSDB index in the
  # "loki" bucket of the storage (rustfs) service. The bucket is created by a pre_start
  # init container, which requires Docker Compose >= 5.3.0. If you cannot upgrade yet,
  # see https://distr.sh/docs/self-hosting/docker/ for a one-shot service alternative.
  # Loki only joins the private "internal" network and is not reachable from outside.
  loki:
    image: 'grafana/loki:3.7.3'
    command: ['-config.file=/etc/loki/distr-config.yaml']
    configs:
      - source: loki-config
        target: /etc/loki/distr-config.yaml
    volumes:
      - 'loki:/loki'
    networks:
      - internal
    depends_on:
      storage:
        condition: service_healthy
    pre_start:
      - image: 'rclone/rclone:1.74.4'
        environment:
          RCLONE_CONFIG_STORAGE_TYPE: s3
          RCLONE_CONFIG_STORAGE_PROVIDER: Other
          RCLONE_CONFIG_STORAGE_ENDPOINT: 'http://storage:9000'
          RCLONE_CONFIG_STORAGE_ACCESS_KEY_ID: '${REGISTRY_S3_ACCESS_KEY_ID}'
          RCLONE_CONFIG_STORAGE_SECRET_ACCESS_KEY: '${REGISTRY_S3_SECRET_ACCESS_KEY}'
        command: ['mkdir', 'storage:loki']
    restart: always
    logging: *default-logging

configs:
  loki-config:
    content: |
      auth_enabled: true

      server:
        http_listen_port: 3100
        # A single query result page (max_entries_limit_per_query entries) can exceed
        # the 4 MB gRPC default, which makes the internal querier->frontend handoff
        # fail and the query hang until it times out.
        grpc_server_max_recv_msg_size: 67108864
        grpc_server_max_send_msg_size: 67108864

      common:
        path_prefix: /loki
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory

      schema_config:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: index_
              period: 24h

      storage_config:
        aws:
          endpoint: http://storage:9000
          region: local
          access_key_id: ${REGISTRY_S3_ACCESS_KEY_ID}
          secret_access_key: ${REGISTRY_S3_SECRET_ACCESS_KEY}
          bucketnames: loki
          s3forcepathstyle: true

      compactor:
        retention_enabled: true
        delete_request_store: s3
        working_directory: /loki/compactor

      limits_config:
        retention_period: 720h
        increment_duplicate_timestamp: true
        allow_structured_metadata: true
        max_global_streams_per_user: 25000
        # Truncate oversized log lines instead of rejecting the whole push.
        max_line_size_truncate: true
        # Accept backfilled logs up to the retention period so an agent that was
        # offline can still push its backlog.
        reject_old_samples_max_age: 720h
        # Raised moderately from Loki's 4/6 MB defaults to give an organization with
        # several chatty agents more headroom before pushes are throttled.
        ingestion_rate_mb: 16
        ingestion_burst_size_mb: 32

networks:
  # Public-facing network shared by caddy and the hub only.
  proxy:
  # Private network for the hub and its backing services (database, storage).
  # caddy is intentionally not attached here.
  internal:
    internal: true

volumes:
  postgres:
  rustfs:
  loki:
  caddy_data:
  caddy_config:
