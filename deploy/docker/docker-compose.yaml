name: distr

x-logging: &default-logging
  driver: 'json-file'
  options:
    max-size: '10m'
    max-file: '3'

services:
  postgres:
    image: 'postgres:18.4-alpine3.23'
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - 'postgres:/var/lib/postgresql/'
    restart: always
    logging: *default-logging
    healthcheck:
      test: pg_isready -h localhost -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      start_interval: 1s
      interval: 5s
      retries: 6
      start_period: 30s

  hub:
    image: ghcr.io/distr-sh/distr-ce:2.26.0 # x-release-please-version
    depends_on:
      postgres:
        condition: service_healthy
      # Remove when using an external S3 provider
      storage:
        condition: service_healthy
      loki:
        condition: service_started
    env_file:
      - .env
    ports:
      - '8080:8080'
      - '8585:8585'
    restart: always
    logging: *default-logging

  # The OCI registry of distr can use any S3 compatible storage to store OCI images.
  # If you don't want to use the OCI registry (REGISTRY_ENABLED=false) or want to use an external S3 provider,
  # you don't need to run the storage service.
  storage:
    image: 'rustfs/rustfs:1.0.0-beta.8'
    volumes:
      - 'rustfs:/data/'
    environment:
      RUSTFS_ACCESS_KEY: ${REGISTRY_S3_ACCESS_KEY_ID}
      RUSTFS_SECRET_KEY: ${REGISTRY_S3_SECRET_ACCESS_KEY}
    restart: always
    logging: *default-logging
    healthcheck:
      # Production strict TLS example (SAN/FQDN aligned, no `-k`):
      # curl -f --cacert /opt/tls/ca.crt --resolve rustfs-a.example.com:9000:127.0.0.1 https://rustfs-a.example.com:9000/health
      test: ['CMD', 'sh', '-c', 'curl -f http://127.0.0.1:9000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Loki stores deployment and deployment target log records (30 days retention).
  # It runs in monolithic (single-binary) mode and persists chunks + TSDB index in the
  # "loki" bucket of the storage (rustfs) service. The bucket is created by a pre_start
  # init container, which requires Docker Compose >= 5.3.0. If you cannot upgrade yet,
  # see https://distr.sh/docs/self-hosting/docker/ for a one-shot service alternative.
  loki:
    image: 'grafana/loki:3.7.3'
    command: ['-config.file=/etc/loki/distr-config.yaml']
    configs:
      - source: loki-config
        target: /etc/loki/distr-config.yaml
    volumes:
      - 'loki:/loki'
    depends_on:
      storage:
        condition: service_healthy
    pre_start:
      - image: 'rclone/rclone:1.74.4'
        environment:
          RCLONE_CONFIG_STORAGE_TYPE: s3
          RCLONE_CONFIG_STORAGE_PROVIDER: Other
          RCLONE_CONFIG_STORAGE_ENDPOINT: 'http://storage:9000'
          RCLONE_CONFIG_STORAGE_ACCESS_KEY_ID: '${REGISTRY_S3_ACCESS_KEY_ID}'
          RCLONE_CONFIG_STORAGE_SECRET_ACCESS_KEY: '${REGISTRY_S3_SECRET_ACCESS_KEY}'
        command: ['mkdir', 'storage:loki']
    restart: always
    logging: *default-logging

configs:
  loki-config:
    content: |
      auth_enabled: true

      server:
        http_listen_port: 3100
        # A single query result page (max_entries_limit_per_query entries) can exceed
        # the 4 MB gRPC default, which makes the internal querier->frontend handoff
        # fail and the query hang until it times out.
        grpc_server_max_recv_msg_size: 67108864
        grpc_server_max_send_msg_size: 67108864

      common:
        path_prefix: /loki
        replication_factor: 1
        ring:
          kvstore:
            store: inmemory

      schema_config:
        configs:
          - from: "2024-01-01"
            store: tsdb
            object_store: s3
            schema: v13
            index:
              prefix: index_
              period: 24h

      storage_config:
        aws:
          endpoint: http://storage:9000
          region: local
          access_key_id: ${REGISTRY_S3_ACCESS_KEY_ID}
          secret_access_key: ${REGISTRY_S3_SECRET_ACCESS_KEY}
          bucketnames: loki
          s3forcepathstyle: true

      compactor:
        retention_enabled: true
        delete_request_store: s3
        working_directory: /loki/compactor

      limits_config:
        retention_period: 720h
        increment_duplicate_timestamp: true
        allow_structured_metadata: true
        max_global_streams_per_user: 25000

volumes:
  postgres:
  rustfs:
  loki:
