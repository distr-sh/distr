name: Release Please

on:
  push:
    branches:
      - main
      - v*.*.x
      - v*.*.*-rc.x
  workflow_dispatch:

jobs:
  release-please:
    timeout-minutes: 1
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release-please.outputs.releases_created }}
      tag_name: ${{ steps.release-please.outputs.tag_name }}
      prs_created: ${{ steps.release-please.outputs.prs_created }}
      pr_head_branch: ${{ steps.release-please.outputs.pr && fromJSON(steps.release-please.outputs.pr).headBranchName || '' }}
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Release Please
        id: release-please
        uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        with:
          token: ${{ secrets.GLASSKUBE_BOT_SECRET }}
          target-branch: ${{ github.ref_name }}

  agent-changelog:
    needs: release-please
    if: needs.release-please.outputs.prs_created == 'true'
    timeout-minutes: 2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout release-please branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GLASSKUBE_BOT_SECRET }}
          ref: ${{ needs.release-please.outputs.pr_head_branch }}
          fetch-depth: 0
      - name: Generate agent changelog
        run: node hack/agent-changelog.mjs website/public/agent-changelog.json origin/${{ github.ref_name }}
      - name: Commit and push
        run: |
          git config user.name "glasskube-bot"
          git config user.email "glasskube-bot@glasskube.com"
          git add website/public/agent-changelog.json
          if git diff --cached --quiet; then
            echo "No agent changelog changes to commit"
          else
            git commit -m "chore: update agent changelog"
            git push
          fi
