@let items = revisions();
@if (items === undefined) {
  <div class="text-sm text-gray-500 dark:text-gray-400">Loading revisions&hellip;</div>
} @else if (items.length === 0) {
  <div class="text-sm text-gray-500 dark:text-gray-400">No revisions found.</div>
} @else {
  <ol class="relative border-s border-gray-200 dark:border-gray-700 ms-2">
    @for (revision of items; track revision.id) {
      <li class="mb-6 ms-4">
        <div
          class="absolute w-3 h-3 bg-gray-200 rounded-full mt-1.5 -start-1.5 border border-white dark:border-gray-800 dark:bg-gray-600"></div>
        <button
          type="button"
          (click)="revisionSelected.emit(revision)"
          class="text-start w-full rounded-lg p-2 -ml-2 hover:bg-gray-100 dark:hover:bg-gray-700">
          <time class="block text-xs font-normal text-gray-400 dark:text-gray-500">
            {{ revision.createdAt | date: 'short' }}
          </time>
          <div class="text-sm font-semibold text-gray-900 dark:text-white">
            {{ revision.applicationVersionName }}
          </div>
          <div class="mt-1 flex items-center gap-2 text-xs">
            @if (revision.createdBy; as createdBy) {
              @let kind = createdBy | organizationKind;
              <span class="text-gray-600 dark:text-gray-300">{{ createdBy.name || createdBy.email }}</span>
              <span
                class="px-1.5 py-0.5 rounded-full capitalize"
                [class]="
                  kind === 'customer'
                    ? 'bg-blue-100 text-blue-800 dark:bg-blue-900 dark:text-blue-300'
                    : kind === 'partner'
                      ? 'bg-purple-100 text-purple-800 dark:bg-purple-900 dark:text-purple-300'
                      : 'bg-green-100 text-green-800 dark:bg-green-900 dark:text-green-300'
                ">
                {{ kind }}
              </span>
            } @else {
              <span class="text-gray-500 dark:text-gray-400">Unknown user</span>
            }
          </div>
        </button>
      </li>
    }
  </ol>
}
