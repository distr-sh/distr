@let items = revisions();
@if (items === undefined) {
  <div class="text-sm text-gray-500 dark:text-gray-400">Loading revisions&hellip;</div>
} @else if (items.length === 0) {
  <div class="text-sm text-gray-500 dark:text-gray-400">No revisions found.</div>
} @else {
  <ol class="border-s border-gray-300 dark:border-gray-700 ms-2 space-y-1">
    @for (revision of items; track revision.id) {
      <li class="ms-2 relative">
        <div
          class="absolute mt-2.5 -start-3.5 size-3 rounded-full border border-white dark:border-gray-800 bg-gray-300 dark:bg-gray-600"></div>
        <button
          type="button"
          (click)="revisionSelected.emit(revision)"
          class="text-start w-full rounded-lg p-2 hover:bg-gray-100 dark:hover:bg-gray-700">
          <div class="flex gap-2 text-sm">
            <span class="font-semibold text-gray-900 dark:text-white">{{ revision.applicationVersionName }}</span>
            @if (revision.id === currentRevisionId()) {
              <span class="text-gray-500 dark:text-gray-400">(current)</span>
            }
          </div>
          <div class="flex gap-1 text-xs">
            @if (revision.createdBy; as createdBy) {
              @let kind = createdBy | organizationKind;
              @let targetKind = deploymentTarget() | organizationKind;
              <span class="text-gray-600 dark:text-gray-300">{{ createdBy.name || createdBy.email }}</span>
              @if (targetKind !== kind) {
                <span class="capitalize text-gray-500 dark:text-gray-400">({{ kind }})</span>
              }
            } @else {
              <span class="text-gray-500 dark:text-gray-400">Unknown user</span>
            }
          </div>
          <time class="block text-xs font-normal text-gray-400 dark:text-gray-500">
            {{ revision.createdAt | date: 'short' }}
          </time>
        </button>
      </li>
    }
  </ol>
}
