<section class="bg-gray-50 dark:bg-gray-900">
  <div class="flex flex-col items-center justify-center px-6 py-8 mx-auto md:h-screen lg:py-0">
    <div class="flex items-center h-16 mb-6 text-4xl font-semibold text-gray-900 dark:text-white">
      <img class="h-full mr-4 border-none" src="distr-logo.svg" alt="Distr Logo" />
      <a [href]="websiteUrl" target="_blank">Distr</a>
    </div>
    <div
      class="w-full bg-white rounded-lg shadow-sm dark:border md:mt-0 sm:max-w-md xl:p-0 dark:bg-gray-800 dark:border-gray-700">
      <div class="p-6 space-y-4 md:space-y-6 sm:p-8 text-center">
        <fa-icon [icon]="faScrewdriverWrench" class="block text-6xl text-gray-900 dark:text-white" />
        <h1 class="text-xl font-bold leading-tight tracking-tight text-gray-900 md:text-2xl dark:text-white">
          We'll be right back
        </h1>
        <p class="text-sm font-light text-gray-500 dark:text-gray-400">
          Distr is temporarily unavailable while we perform maintenance. This page will reconnect automatically as soon
          as the service is back.
        </p>
        <p class="text-sm font-light text-gray-500 dark:text-gray-400">
          For live updates, check our
          <a
            href="https://distrstatus.com/"
            target="_blank"
            rel="noopener"
            class="font-medium text-primary-600 hover:underline dark:text-primary-500"
            >status page</a
          >.
        </p>
        <button
          type="button"
          (click)="check()"
          [disabled]="checking()"
          class="w-full text-white bg-primary-600 hover:bg-primary-700 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:bg-primary-600 dark:hover:bg-primary-700 dark:focus:ring-primary-800 disabled:opacity-50">
          {{ checking() ? 'Checking…' : 'Reload' }}
        </button>
      </div>
    </div>
  </div>
</section>
