<input
  type="date"
  [id]="inputId()"
  [formControl]="control"
  class="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-primary-600 focus:border-primary-600 block w-full p-2.5 dark:bg-gray-700 dark:border-gray-600 dark:placeholder-gray-400 dark:text-white dark:focus:ring-primary-500 dark:focus:border-primary-500 disabled:opacity-60" />
<div class="flex flex-wrap gap-2 mt-2">
  @for (preset of presets; track preset.label) {
    <button
      type="button"
      [disabled]="control.disabled"
      (click)="control.setValue(presetDate(preset))"
      class="text-primary-700 border-primary-600 hover:bg-primary-600 hover:text-white focus:ring-4 focus:outline-none focus:ring-primary-300 leading-5 rounded-lg text-xs px-3 py-0.5 transition-colors disabled:opacity-60 dark:text-primary-300 dark:border-primary-500 dark:hover:bg-primary-600 dark:hover:text-white dark:focus:ring-primary-800"
      [class]="control.value === presetDate(preset) ? 'border-2 font-semibold' : 'border font-medium'">
      {{ preset.label }}
    </button>
  }
  @if (allowNoExpiration()) {
    <button
      type="button"
      [disabled]="control.disabled"
      (click)="control.setValue('')"
      class="text-primary-700 border-primary-600 hover:bg-primary-600 hover:text-white focus:ring-4 focus:outline-none focus:ring-primary-300 leading-5 rounded-lg text-xs px-3 py-0.5 transition-colors disabled:opacity-60 dark:text-primary-300 dark:border-primary-500 dark:hover:bg-primary-600 dark:hover:text-white dark:focus:ring-primary-800"
      [class]="control.value === '' ? 'border-2 font-semibold' : 'border font-medium'">
      Never
    </button>
  }
</div>
