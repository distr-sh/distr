<section class="bg-gray-50 dark:bg-gray-900 p-3 sm:p-5 antialiased">
  <div class="mx-auto max-w-screen-2xl px-4 lg:px-12">
    <div class="bg-white dark:bg-gray-800 relative shadow-md sm:rounded-lg overflow-hidden">
      @if (partnerOrganization(); as partner) {
        <nav class="flex justify-between m-4" aria-label="Breadcrumb">
          <ol class="inline-flex items-center mb-3 sm:mb-0">
            <li class="flex items-center">
              <a
                [routerLink]="['/', 'partners']"
                class="inline-flex items-center text-sm font-medium text-gray-700 hover:text-blue-600 dark:text-gray-400 dark:hover:text-white">
                <fa-icon class="mr-2" [icon]="faBuilding" />
                Partners
              </a>
            </li>
            <span class="mx-2 text-gray-400">/</span>
            <li aria-current="page">
              <span class="text-sm font-medium text-gray-500 dark:text-gray-400">{{ partner.name }}</span>
            </li>
          </ol>
        </nav>
      }

      <app-users
        [partnerOrganizationId]="partnerOrganizationId()"
        [users]="users() ?? []"
        (refresh)="refresh$.next()" />
    </div>
  </div>
</section>
