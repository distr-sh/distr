<section class="bg-gray-50 dark:bg-gray-900 p-3 sm:p-5 antialiased">
  <div class="mx-auto max-w-screen-2xl px-4 lg:px-12">
    <div class="bg-white dark:bg-gray-800 relative shadow-md sm:rounded-lg overflow-hidden">
      @if (customerOrganizations()?.[0]; as firstCustomer) {
        <nav class="flex justify-between items-center m-4">
          <div class="inline-flex items-center text-sm font-medium text-gray-700 dark:text-gray-400">
            <fa-icon class="mr-2" [icon]="faUsers" />
            Organization Users
          </div>
          <a
            [routerLink]="['/', 'customers', firstCustomer.id, 'users']"
            class="inline-flex items-center whitespace-nowrap py-2 text-sm font-medium text-primary-600 hover:text-primary-700 hover:underline dark:text-primary-500 dark:hover:text-primary-400">
            Show customer users
            <fa-icon [icon]="faArrowRight" class="ml-2" />
          </a>
        </nav>
      }

      <app-users (refresh)="refresh$.next()" [users]="users()" />
    </div>
  </div>
</section>
